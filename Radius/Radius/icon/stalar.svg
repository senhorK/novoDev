<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#0f172a" />
  
  <!-- estrelas pequenas -->
  <circle cx="20" cy="30" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="80" cy="50" r="1.5" fill="#ffffff" opacity="0.7" />
  <circle cx="150" cy="40" r="2" fill="#ffffff" opacity="0.9" />
  <circle cx="50" cy="120" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="170" cy="150" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="110" cy="170" r="1.5" fill="#ffffff" opacity="0.7" />
  
  <!-- estrelas médias -->
  <circle cx="130" cy="90" r="3" fill="#ffffff" opacity="0.5" />
  <circle cx="30" cy="170" r="2.5" fill="#ffffff" opacity="0.6" />
  <circle cx="180" cy="80" r="2.5" fill="#ffffff" opacity="0.7" />
  
  <!-- detalhe brilho -->
  <circle cx="100" cy="100" r="4" fill="#ffffff" opacity="0.3" />
</svg>





